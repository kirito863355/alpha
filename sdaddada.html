.navbar a {

    font-size: 18px;
    color: rgb(0, 0, 0);
    font-weight: 500;
    text-decoration: none;
    margin-left:40px ;
}

.navbar a::before {
    box-shadow: 2px 4px 8px rgb(0, 0, 0);
    content: '' ;
    position: absolute;
    top: 100%;
    left: 0;
    width: 0;
    height: 2px;
    background: rgb(0, 0, 0);
    transition: .3s;
}

.navbar a:hover::before {
    width: 100%;
}
